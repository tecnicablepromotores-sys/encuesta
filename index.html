<!DOCTYPE html>
<html>
<body>
    <button id="btnTest">PRUEBA DE CONEXIÓN</button>
    <div id="resultado">Esperando...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const config = {
            apiKey: "AIzaSyAJcNNQWzk99nvk8fUW001zeDsM_XTwFzU",
            projectId: "formulario-9b119",
            storageBucket: "formulario-9b119.firebasestorage.app",
            appId: "1:648279847643:web:802107ded1f0f5957f52fe"
        };

        const db = getFirestore(initializeApp(config));

        document.getElementById('btnTest').addEventListener('click', async () => {
            try {
                await addDoc(collection(db, "test"), { fecha: new Date() });
                document.getElementById('resultado').innerText = "✅ ¡CONEXIÓN EXITOSA! Firebase responde.";
            } catch (e) {
                document.getElementById('resultado').innerText = "❌ ERROR: " + e.message;
            }
        });
    </script>
</body>
</html>
