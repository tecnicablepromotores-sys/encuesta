<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solicitud de Conexión a Internet</title>
    <style>
        :root { 
            --fondo: #121214; 
            --tarjeta: #1a1a1e; 
            --texto: #e1e1e6; 
            --texto-secundario: #a8a8b3;
            --azul: #2563eb; 
            --azul-hover: #1d4ed8; 
            --bordes: #29292e; 
            --entradas: #121214;
        }
        body { font-family: sans-serif; background-color: var(--fondo); color: var(--texto); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; box-sizing: border-box; }
        .contenedor { background-color: var(--tarjeta); width: 100%; max-width: 700px; padding: 32px; border-radius: 12px; border: 1px solid var(--bordes); box-sizing: border-box; }
        .encabezado { text-align: center; margin-bottom: 30px; border-bottom: 1px solid var(--bordes); padding-bottom: 20px; }
        .encabezado h2 { margin: 0; font-size: 24px; color: #ffffff; }
        .encabezado p { margin: 8px 0 0 0; font-size: 14px; color: var(--texto-secundario); }
        .fila-doble { display: flex; gap: 16px; margin-bottom: 16px; }
        .campo { margin-bottom: 16px; flex: 1; display: flex; flex-direction: column; }
        label { font-size: 14px; margin-bottom: 8px; font-weight: 500; color: var(--texto); }
        input, select, textarea { background-color: var(--entradas); color: var(--texto); padding: 12px; border: 1px solid var(--bordes); border-radius: 6px; font-size: 15px; box-sizing: border-box; width: 100%; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--azul); }
        .input-archivo { background-color: transparent; border: none; padding: 6px 0; color: var(--texto-secundario); }
        .btn { background-color: var(--azul); color: #ffffff; border: none; padding: 14px; border-radius: 6px; font-size: 16px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 15px; transition: background 0.2s; }
        .btn:hover { background-color: var(--azul-hover); }
        .btn:disabled { background-color: #494949; color: #8d8d8d; cursor: not-allowed; }
        .alerta { margin-top: 20px; padding: 20px; border-radius: 8px; font-size: 15px; text-align: center; display: none; line-height: 1.6; font-weight: bold; }
        .exito { background-color: #122c1e; color: #4ade80; border: 1px solid #1f4d36; }
        .error { background-color: #3c1e1e; color: #f87171; border: 1px solid #5a2828; }
        @media (max-width: 600px) { .fila-doble { flex-direction: column; gap: 0; } }
    </style>
</head>
<body>

<div class="contenedor">
    <div class="encabezado">
        <h2>Solicitud de Conexión a Internet</h2>
        <p>Formulario de Registro y Afiliación de Clientes</p>
    </div>

    <form id="formularioEncuesta">
        <div class="fila-doble">
            <div class="campo"><label>Nombre(s) *</label><input type="text" id="txtNombres" required placeholder="Ingresa tu Nombre(s)"></div>
            <div class="campo"><label>Apellidos *</label><input type="text" id="txtApellidos" required placeholder="Ingresa tus Apellidos"></div>
        </div>

        <div class="fila-doble">
            <div class="campo"><label>Cédula de Identidad (CI) *</label><input type="text" id="txtCI" required placeholder="Ingresa tu CI"></div>
            <div class="campo"><label>Correo electrónico *</label><input type="email" id="txtEmail" required placeholder="Ingresa tu Correo electrónico"></div>
        </div>

        <div class="campo"><label>Dirección *</label><textarea id="txtDireccion" rows="3" required placeholder="Ingresa tu Dirección"></textarea></div>
        <div class="campo"><label>Coordenadas *</label><input type="text" id="txtCoordenadas" required placeholder="Ej. 10.9012,-64.1234"></div>

        <div class="fila-doble">
            <div class="campo"><label>Barrio / Localidad / Departamento *</label><input type="text" id="txtLocalidad" required placeholder="Ingresa tu Barrio/Localidad/Departamento"></div>
            <div class="campo"><label>Ciudad / Municipio *</label><input type="text" id="txtCiudad" required placeholder="Ingresa tu Ciudad/Municipio"></div>
        </div>

        <div class="fila-doble">
            <div class="campo"><label>Código Postal *</label><input type="text" id="txtPostal" required placeholder="Ingresa tu Código Postal"></div>
            <div class="campo"><label>Teléfono Celular *</label><input type="tel" id="txtTelefono" required placeholder="Ingresa tu Teléfono Celular"></div>
        </div>

        <div class="campo"><label>Teléfono Celular Adicional</label><input type="tel" id="txtTelefonoAdicional" placeholder="Ingresa un Teléfono Celular Adicional"></div>

        <div class="campo"><label>Foto de identificación oficial (Frente) *</label><input type="file" id="fileFrente" class="input-archivo" accept="image/*" required></div>
        <div class="campo"><label>Foto de identificación oficial (Atrás) *</label><input type="file" id="fileAtras" class="input-archivo" accept="image/*" required></div>
        <div class="campo"><label>Foto de comprobante de domicilio *</label><input type="file" id="fileDomicilio" class="input-archivo" accept="image/*" required></div>
        <div class="campo"><label>Cupón / Descuento</label><input type="file" id="fileCupon" class="input-archivo" accept="image/*"></div>

        <div class="campo"><label>Comentarios</label><textarea id="txtComentarios" rows="4" placeholder="Escribe aquí tus comentarios..."></textarea></div>

        <button type="submit" class="btn" id="btnEnviar">Enviar Información</button>
        <div id="cajaAlerta" class="alerta"></div>
    </form>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const configuracionFirebase = {
        apiKey: "AIzaSyAJcNNQWzk99nvk8fUW001zeDsM_XTwFzU",
        authDomain: "formulario-9b119.firebaseapp.com",
        projectId: "formulario-9b119",
        storageBucket: "formulario-9b119.firebasestorage.app",
        messagingSenderId: "648279847643",
        appId: "1:648279847643:web:802107ded1f0f5957f52fe"
    };

    const app = initializeApp(configuracionFirebase);
    const db = getFirestore(app);

    // FUNCIÓN CORE: Redimensiona, comprime y convierte la imagen a Base64 de forma asíncrona
    function procesarYConvertirABase64(archivo) {
        return new Promise((resolver, rechazar) => {
            if (!archivo) return resolver("No adjunto");

            const lector = new FileReader();
            lector.readAsDataURL(archivo);
            lector.onload = (evento) => {
                const img = new Image();
                img.src = evento.target.result;
                img.onload = () => {
                    const canvas = document.createElement("canvas");
                    const ctx = canvas.getContext("2d");

                    // Definir resolución máxima para mantener el archivo por debajo de 200KB
                    const MAX_ANCHO = 800;
                    const MAX_ALTO = 600;
                    let ancho = img.width;
                    let alto = img.height;

                    if (ancho > alto) {
                        if (ancho > MAX_ANCHO) { alto *= MAX_ANCHO / ancho; ancho = MAX_ANCHO; }
                    } else {
                        if (alto > MAX_ALTO) { ancho *= MAX_ALTO / alto; alto = MAX_ALTO; }
                    }

                    canvas.width = ancho;
                    canvas.height = alto;
                    ctx.drawImage(img, 0, 0, ancho, alto);

                    // Exportar como JPEG comprimido al 70% de calidad (Formato texto Base64 directo)
                    const dataUrlComprimida = canvas.toDataURL("image/jpeg", 0.7);
                    resolver(dataUrlComprimida);
                };
            };
            lector.onerror = (error) => rechazar(error);
        });
    }

    document.getElementById('formularioEncuesta').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnEnviar');
        const aviso = document.getElementById('cajaAlerta');

        btn.disabled = true;
        btn.innerText = "Procesando codificación y optimización de archivos...";
        aviso.style.display = "none";

        try {
            const fotoFrente = document.getElementById('fileFrente').files[0];
            const fotoAtras = document.getElementById('fileAtras').files[0];
            const fotoDomicilio = document.getElementById('fileDomicilio').files[0];
            const fotoCupon = document.getElementById('fileCupon').files[0];

            // Conversión paralela ultrarrápida a Base64 en el navegador del cliente
            const base64Frente = await procesarYConvertirABase64(fotoFrente);
            const base64Atras = await procesarYConvertirABase64(fotoAtras);
            const base64Domicilio = await procesarYConvertirABase64(fotoDomicilio);
            const base64Cupon = fotoCupon ? await procesarYConvertirABase64(fotoCupon) : "No adjunto";

            const expedienteManga = {
                nombres: document.getElementById('txtNombres').value.trim(),
                apellidos: document.getElementById('txtApellidos').value.trim(),
                cedula_rif: document.getElementById('txtCI').value.trim(),
                email: document.getElementById('txtEmail').value.trim(),
                direccion: document.getElementById('txtDireccion').value.trim(),
                coordenadas: document.getElementById('txtCoordenadas').value.trim(),
                localidad_barrio: document.getElementById('txtLocalidad').value.trim(),
                ciudad_municipio: document.getElementById('txtCiudad').value.trim(),
                codigo_postal: document.getElementById('txtPostal').value.trim(),
                telefono: document.getElementById('txtTelefono').value.trim(),
                telefono_adicional: document.getElementById('txtTelefonoAdicional').value.trim() || "No indicado",
                comentarios: document.getElementById('txtComentarios').value.trim() || "Sin comentarios",
                
                // Las imágenes se guardan como texto nativo plano dentro de los campos
                foto_frente_base64: base64Frente,
                foto_atras_base64: base64Atras,
                foto_domicilio_base64: base64Domicilio,
                foto_cupon_base64: base64Cupon,
                
                fecha_registro: new Date().toISOString(),
                estado: "Pendiente Validacion"
            };

            // Inserción en la colección Firestore
            await addDoc(collection(db, "encuestas"), expedienteManga);

            aviso.className = "alerta exito";
            aviso.innerHTML = "Gracias por su información estará siendo verificada por nuestros promotores";
            aviso.style.display = "block";
            
            document.getElementById('formularioEncuesta').reset();

        } catch (error) {
            console.error(error);
            aviso.className = "alerta error";
            aviso.innerHTML = "Ocurrió un error local en la conversión asíncrona. Revisa el tipo de archivo.";
            aviso.style.display = "block";
        } finally {
            btn.disabled = false;
            btn.innerText = "Enviar Información";
        }
    });
</script>
</body>
</html>
