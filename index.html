<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud de Conexión a Internet</title>
    <style>
        /* TEMA OSCURO - REPLICA EXACTA DE LA INTERFAZ */
        :root {
            --bg-body: #121212;
            --bg-card: #1e1e1e;
            --border-color: #333333;
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --accent-blue: #2563eb;
            --accent-blue-hover: #1d4ed8;
            --accent-green: #10b981;
            --accent-green-hover: #059669;
            --bg-input: #121212;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .form-container {
            background-color: var(--bg-card);
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 700px;
            border: 1px solid var(--border-color);
        }

        .form-header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        .form-header h2 {
            margin: 0 0 5px 0;
            font-size: 22px;
            font-weight: 600;
        }

        .form-header p {
            margin: 0;
            color: var(--text-muted);
            font-size: 14px;
        }

        .grid-2-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        .grid-2-col .form-group {
            margin-bottom: 0;
        }

        label {
            font-size: 13px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        label span.req {
            color: #ef4444;
        }

        input[type="text"], 
        input[type="email"], 
        input[type="tel"],
        select {
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        /* Contenedor especial para coordenadas y botones */
        .coord-container {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 10px;
        }

        .btn-small {
            padding: 0 15px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
            color: white;
            transition: 0.2s;
        }

        .btn-green { background-color: var(--accent-green); }
        .btn-green:hover { background-color: var(--accent-green-hover); }
        .btn-gray { background-color: #4b5563; }
        .btn-gray:hover { background-color: #374151; }

        /* Estilos para las tarjetas de Planes */
        .plans-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 5px;
        }

        .plan-card {
            position: relative;
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .plan-card:hover {
            border-color: #555;
        }

        /* Ocultar el radio button real */
        .plan-card input[type="radio"] {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        /* Estilo cuando el radio está seleccionado */
        .plan-card input[type="radio"]:checked + .plan-content {
            border-color: var(--accent-green);
        }
        
        .plan-card:has(input[type="radio"]:checked) {
            border: 2px solid var(--accent-blue);
            background-color: rgba(37, 99, 235, 0.1);
        }

        .plan-title {
            display: block;
            font-weight: bold;
            font-size: 15px;
            margin-bottom: 5px;
        }

        .plan-price {
            display: block;
            color: var(--accent-green);
            font-size: 13px;
            margin-bottom: 2px;
        }

        .plan-desc {
            display: block;
            color: var(--text-muted);
            font-size: 12px;
        }

        /* Archivo de subida */
        input[type="file"] {
            font-size: 13px;
            color: var(--text-muted);
        }
        input[type="file"]::file-selector-button {
            background-color: #374151;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            margin-right: 15px;
            cursor: pointer;
        }

        /* Botón de envío */
        .btn-submit {
            width: 100%;
            background-color: var(--accent-blue);
            color: white;
            border: none;
            padding: 16px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }

        .btn-submit:hover {
            background-color: var(--accent-blue-hover);
        }
        .btn-submit:disabled {
            background-color: #374151;
            cursor: not-allowed;
        }

        /* Mensajes del sistema */
        .alert {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            font-weight: 500;
            text-align: center;
        }
        .alert-success { background-color: rgba(16, 185, 129, 0.2); color: #34d399; border: 1px solid #10b981; }
        .alert-error { background-color: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid #ef4444; }

        /* Responsividad para móviles */
        @media (max-width: 600px) {
            .grid-2-col { grid-template-columns: 1fr; }
            .coord-container { grid-template-columns: 1fr; }
            .btn-small { padding: 12px; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="form-container">
        <div class="form-header">
            <h2>Solicitud de Conexión a Internet</h2>
            <p>Formulario de Registro y Afiliación de Clientes</p>
        </div>

        <div id="msgSuccess" class="alert alert-success">¡Solicitud registrada correctamente en el sistema!</div>
        <div id="msgError" class="alert alert-error">Error de conexión. Verifique los datos y reintente.</div>

        <form id="registroClienteForm">
            
            <div class="grid-2-col">
                <div class="form-group">
                    <label>Nombre(s) <span class="req">*</span></label>
                    <input type="text" id="nombres" placeholder="Ingresa tu Nombre(s)" required>
                </div>
                <div class="form-group">
                    <label>Apellidos <span class="req">*</span></label>
                    <input type="text" id="apellidos" placeholder="Ingresa tus Apellidos" required>
                </div>
            </div>

            <div class="grid-2-col">
                <div class="form-group">
                    <label>Cédula de Identidad (CI) <span class="req">*</span></label>
                    <input type="text" id="cedula" placeholder="Ingresa tu CI" required>
                </div>
                <div class="form-group">
                    <label>Correo electrónico <span class="req">*</span></label>
                    <input type="email" id="correo" placeholder="Ingresa tu Correo electrónico" required>
                </div>
            </div>

            <div class="form-group">
                <label>Dirección Corta <span class="req">*</span></label>
                <input type="text" id="direccion" placeholder="Ej. Calle Principal, Casa Nro 5" required>
            </div>

            <div class="form-group">
                <label>Punto de Referencia <span class="req">*</span></label>
                <input type="text" id="referencia" placeholder="Ej. Frente a la plaza, casa color azul con portón blanco" required>
            </div>

            <div class="form-group">
                <label>Coordenadas de Ubicación (Latitud, Longitud) <span class="req">*</span></label>
                <div class="coord-container">
                    <input type="text" id="coordenadas" placeholder="Ej. 10.9543, -64.0124" required>
                    <button type="button" class="btn-small btn-green" id="btnGeolocalizar">📍 Mi Ubicación</button>
                    <button type="button" class="btn-small btn-gray" id="btnMaps">🗺️ Maps</button>
                </div>
            </div>

            <div class="grid-2-col">
                <div class="form-group">
                    <label>Barrio / Localidad / Sector <span class="req">*</span></label>
                    <input type="text" id="sector" placeholder="Ej. Punta de Piedras / Tubores" required>
                </div>
                <div class="form-group">
                    <label>Ciudad / Municipio <span class="req">*</span></label>
                    <input type="text" id="ciudad" placeholder="Ej. Porlamar / Mariño" required>
                </div>
            </div>

            <div class="grid-2-col">
                <div class="form-group">
                    <label>Teléfono Celular <span class="req">*</span></label>
                    <input type="tel" id="telefono1" placeholder="Ej. 0412-1234567" required>
                </div>
                <div class="form-group">
                    <label>Teléfono Celular Adicional</label>
                    <input type="tel" id="telefono2" placeholder="Opcional">
                </div>
            </div>

            <div class="form-group">
                <label>Plan de Internet / Servicio Solicitado <span class="req">*</span></label>
                <div class="plans-grid">
                    <label class="plan-card">
                        <input type="radio" name="plan" value="Basico" required>
                        <span class="plan-content">
                            <span class="plan-title">Básico</span>
                            <span class="plan-price">$30 / mes</span>
                            <span class="plan-desc">400 Mbps</span>
                        </span>
                    </label>
                    <label class="plan-card">
                        <input type="radio" name="plan" value="Hogar">
                        <span class="plan-content">
                            <span class="plan-title">Hogar</span>
                            <span class="plan-price">$35 / mes</span>
                            <span class="plan-desc">600 Mbps</span>
                        </span>
                    </label>
                    <label class="plan-card">
                        <input type="radio" name="plan" value="Turbo">
                        <span class="plan-content">
                            <span class="plan-title">Turbo</span>
                            <span class="plan-price">$40 / mes</span>
                            <span class="plan-desc">800 Mbps</span>
                        </span>
                    </label>
                    <label class="plan-card">
                        <input type="radio" name="plan" value="VIP">
                        <span class="plan-content">
                            <span class="plan-title">VIP</span>
                            <span class="plan-price">$45 / mes</span>
                            <span class="plan-desc">1 Gbps</span>
                        </span>
                    </label>
                    <label class="plan-card">
                        <input type="radio" name="plan" value="Solo TV">
                        <span class="plan-content">
                            <span class="plan-title">Solo TV</span>
                            <span class="plan-price">$10 / mes</span>
                            <span class="plan-desc">Servicio de TV</span>
                        </span>
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label>Foto de la Cédula de Identidad (Frente) <span class="req">*</span></label>
                <input type="file" id="fotoCedula" accept="image/*" required>
            </div>

            <div class="form-group">
                <label>Promotor Responsable del Registro <span class="req">*</span></label>
                <select id="promotor" required>
                    <option value="" disabled selected>-- Selecciona el Promotor --</option>
                    <option value="Promotor_A">Promotor Alfa</option>
                    <option value="Promotor_B">Promotor Beta</option>
                    <option value="Oficina_Principal">Oficina Principal</option>
                </select>
            </div>

            <button type="submit" class="btn-submit" id="btnEnviar">Enviar Información</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Configuración oficial de tu proyecto
        const firebaseConfig = {
            apiKey: "AIzaSyAbnLpJIPOxhf1Fe4DUWZkpGJ7Y871o52Y",
            authDomain: "formulario-9b119.firebaseapp.com",
            projectId: "formulario-9b119",
            storageBucket: "formulario-9b119.firebasestorage.app",
            messagingSenderId: "648279847643",
            appId: "1:648279847643:web:802107ded1f0f5957f52fe"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- FUNCIONES DE LA INTERFAZ ---
        
        // 1. Geolocalización Automática
        document.getElementById('btnGeolocalizar').addEventListener('click', () => {
            const coordInput = document.getElementById('coordenadas');
            coordInput.value = "Obteniendo ubicación...";
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        coordInput.value = `${position.coords.latitude}, ${position.coords.longitude}`;
                    },
                    (error) => {
                        coordInput.value = "";
                        alert("No se pudo obtener la ubicación. Por favor, asegúrese de dar permisos al navegador o escríbala manualmente.");
                    },
                    { enableHighAccuracy: true }
                );
            } else {
                alert("La geolocalización no es soportada por este navegador.");
            }
        });

        // 2. Abrir Google Maps
        document.getElementById('btnMaps').addEventListener('click', () => {
            window.open("https://www.google.com/maps", "_blank");
        });

        // --- PROCESAMIENTO DEL FORMULARIO ---
        const formulario = document.getElementById('registroClienteForm');
        const btnEnviar = document.getElementById('btnEnviar');
        const msgSuccess = document.getElementById('msgSuccess');
        const msgError = document.getElementById('msgError');

        formulario.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            btnEnviar.textContent = "Procesando Solicitud...";
            btnEnviar.disabled = true;

            // Extraer el plan seleccionado de los radio buttons
            const planSeleccionado = document.querySelector('input[name="plan"]:checked').value;
            
            // Extraer el nombre del archivo de la cédula (Temporal hasta habilitar Storage)
            const archivoInput = document.getElementById('fotoCedula');
            const nombreArchivo = archivoInput.files.length > 0 ? archivoInput.files[0].name : "Sin archivo";

            const payloadCliente = {
                nombres: document.getElementById('nombres').value,
                apellidos: document.getElementById('apellidos').value,
                cedula: document.getElementById('cedula').value,
                correo: document.getElementById('correo').value,
                direccion: document.getElementById('direccion').value,
                referencia: document.getElementById('referencia').value,
                coordenadas: document.getElementById('coordenadas').value,
                sector: document.getElementById('sector').value,
                ciudad: document.getElementById('ciudad').value,
                telefono_principal: document.getElementById('telefono1').value,
                telefono_adicional: document.getElementById('telefono2').value,
                plan_asignado: planSeleccionado,
                foto_cedula_ref: nombreArchivo,
                promotor: document.getElementById('promotor').value,
                fecha_registro: new Date().toISOString()
            };

            try {
                // Guardar en la colección "Solicitudes_Afiliacion"
                const docRef = await addDoc(collection(db, "Solicitudes_Afiliacion"), payloadCliente);
                
                msgSuccess.style.display = 'block';
                msgError.style.display = 'none';
                formulario.reset();
                window.scrollTo({ top: 0, behavior: 'smooth' });

                setTimeout(() => { msgSuccess.style.display = 'none'; }, 5000);

            } catch (error) {
                console.error("Error al registrar: ", error);
                msgError.textContent = "Error de conexión: " + error.message;
                msgError.style.display = 'block';
                msgSuccess.style.display = 'none';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } finally {
                btnEnviar.textContent = "Enviar Información";
                btnEnviar.disabled = false;
            }
        });
    </script>
</body>
</html>
</html>
