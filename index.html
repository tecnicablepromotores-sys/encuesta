<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Censo de Suscriptores | Conetcom & Tecnicable</title>
    <style>
        /* =========================================
           TEMA OSCURO PROFESIONAL Y RESPONSIVO
           ========================================= */
        :root {
            --bg-body: #121212;
            --bg-card: #1e1e1e;
            --border-color: #333333;
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --accent-blue: #2563eb;
            --accent-blue-hover: #1d4ed8;
            --accent-green: #10b981;
            --accent-green-hover: #059669;
            --bg-input: #121212;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .form-container {
            background-color: var(--bg-card);
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 700px;
            border: 1px solid var(--border-color);
        }

        .form-header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        .form-header h2 {
            margin: 0 0 5px 0;
            font-size: 22px;
            font-weight: 600;
            color: var(--accent-blue);
        }

        .form-header p {
            margin: 0;
            color: var(--text-muted);
            font-size: 14px;
        }

        .grid-2-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        .grid-2-col .form-group {
            margin-bottom: 0;
        }

        label {
            font-size: 13px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        label span.req {
            color: #ef4444;
        }

        input[type="text"], 
        input[type="email"], 
        input[type="tel"],
        select {
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.2s;
            width: 100%;
            box-sizing: border-box;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
        }

        /* Contenedor de Coordenadas GPS */
        .coord-container {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
        }

        .btn-small {
            padding: 0 15px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
            color: white;
            transition: 0.2s;
            height: 100%;
        }

        .btn-green { background-color: var(--accent-green); }
        .btn-green:hover { background-color: var(--accent-green-hover); }

        /* Selector de Planes (SmartOLT / WispHub) */
        .plans-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 10px;
            margin-top: 5px;
        }

        .plan-card {
            position: relative;
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .plan-card input[type="radio"] {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .plan-card:has(input[type="radio"]:checked) {
            border: 2px solid var(--accent-blue);
            background-color: rgba(37, 99, 235, 0.1);
        }

        .plan-title { display: block; font-weight: bold; font-size: 14px; margin-bottom: 3px; }

        /* Botón de Envío Principal */
        .btn-submit {
            width: 100%;
            background-color: var(--accent-blue);
            color: white;
            border: none;
            padding: 16px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.2s;
        }
        .btn-submit:hover { background-color: var(--accent-blue-hover); }
        .btn-submit:disabled { background-color: #374151; cursor: not-allowed; }

        /* Alertas del Sistema */
        .alert {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            font-weight: 500;
            text-align: center;
        }
        .alert-success { background-color: rgba(16, 185, 129, 0.2); color: #34d399; border: 1px solid #10b981; }
        .alert-error { background-color: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid #ef4444; }

        @media (max-width: 600px) {
            .grid-2-col { grid-template-columns: 1fr; }
            .coord-container { grid-template-columns: 1fr; }
            .btn-small { padding: 12px; justify-content: center; }
            .plans-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <div class="form-container">
        <div class="form-header">
            <h2>Censo de Suscriptores</h2>
            <p>Registro Oficial de Contratos Web</p>
        </div>

        <div id="msgSuccess" class="alert alert-success">¡Contrato registrado y enviado a la App exitosamente!</div>
        <div id="msgError" class="alert alert-error">Error de conexión con la base de datos. Verifique su internet.</div>

        <form id="registroCensoForm">
            
            <div class="grid-2-col">
                <div class="form-group">
                    <label>Nombres <span class="req">*</span></label>
                    <input type="text" id="nombres" placeholder="Nombres del titular" required>
                </div>
                <div class="form-group">
                    <label>Apellidos <span class="req">*</span></label>
                    <input type="text" id="apellidos" placeholder="Apellidos del titular" required>
                </div>
            </div>

            <div class="grid-2-col">
                <div class="form-group">
                    <label>Cédula de Identidad <span class="req">*</span></label>
                    <input type="text" id="cedula" placeholder="Ej. V-12345678" required>
                </div>
                <div class="form-group">
                    <label>Teléfono Principal <span class="req">*</span></label>
                    <input type="tel" id="telefono_principal" placeholder="Ej. 0412-1234567" required>
                </div>
            </div>

            <div class="form-group">
                <label>Dirección Exacta de Instalación <span class="req">*</span></label>
                <input type="text" id="direccion" placeholder="Calle, número de casa, punto de referencia..." required>
            </div>

            <div class="grid-2-col">
                <div class="form-group">
                    <label>Sector / Localidad <span class="req">*</span></label>
                    <input type="text" id="sector" placeholder="Ej. Punta de Piedras" required>
                </div>
                <div class="form-group">
                    <label>Municipio <span class="req">*</span></label>
                    <input type="text" id="ciudad" placeholder="Ej. Tubores" required>
                </div>
            </div>

            <div class="form-group">
                <label>Coordenadas GPS (Obligatorio) <span class="req">*</span></label>
                <div class="coord-container">
                    <input type="text" id="coordenadas" placeholder="Presiona 'Mi Ubicación'..." required readonly>
                    <button type="button" class="btn-small btn-green" id="btnGeolocalizar">📍 Mi Ubicación</button>
                </div>
            </div>

            <div class="form-group">
                <label>Plan Asignado (Sistema WispHub / SmartOLT) <span class="req">*</span></label>
                <div class="plans-grid">
                    <label class="plan-card">
                        <input type="radio" name="plan" value="Basico" required>
                        <span class="plan-content"><span class="plan-title">Básico</span></span>
                    </label>
                    <label class="plan-card">
                        <input type="radio" name="plan" value="Hogar">
                        <span class="plan-content"><span class="plan-title">Hogar</span></span>
                    </label>
                    <label class="plan-card">
                        <input type="radio" name="plan" value="Turbo">
                        <span class="plan-content"><span class="plan-title">Turbo</span></span>
                    </label>
                    <label class="plan-card">
                        <input type="radio" name="plan" value="VIP">
                        <span class="plan-content"><span class="plan-title">VIP</span></span>
                    </label>
                    <label class="plan-card">
                        <input type="radio" name="plan" value="Solo TV">
                        <span class="plan-content"><span class="plan-title">Solo TV</span></span>
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label>Promotor / Equipo Responsable <span class="req">*</span></label>
                <select id="promotor" required>
                    <option value="" disabled selected>-- Seleccione Responsable --</option>
                    <option value="Equipo_Calle_1">Equipo de Calle 1</option>
                    <option value="Equipo_Calle_2">Equipo de Calle 2</option>
                    <option value="Oficina_Principal">Oficina Principal</option>
                </select>
            </div>

            <button type="submit" class="btn-submit" id="btnEnviar">Registrar en Contratos Web</button>
        </form>
    </div>

    <script type="module">
        // Importación de módulos nativos
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Configuración de tu proyecto exacto
        const firebaseConfig = {
            apiKey: "AIzaSyAbnLpJIPOxhf1Fe4DUWZkpGJ7Y871o52Y", 
            authDomain: "formulario-9b119.firebaseapp.com",
            projectId: "formulario-9b119",
            storageBucket: "formulario-9b119.firebasestorage.app",
            messagingSenderId: "648279847643",
            appId: "1:648279847643:web:802107ded1f0f5957f52fe"
        };

        // Inicialización
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Lógica de Geolocalización
        document.getElementById('btnGeolocalizar').addEventListener('click', () => {
            const coordInput = document.getElementById('coordenadas');
            coordInput.value = "Capturando coordenadas...";
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        coordInput.value = `${position.coords.latitude}, ${position.coords.longitude}`;
                    },
                    (error) => {
                        coordInput.value = "";
                        alert("Por favor active el GPS de su dispositivo para continuar.");
                    },
                    { enableHighAccuracy: true }
                );
            }
        });

        // Evento de Envío del Formulario
        const formulario = document.getElementById('registroCensoForm');
        const btnEnviar = document.getElementById('btnEnviar');
        const msgSuccess = document.getElementById('msgSuccess');
        const msgError = document.getElementById('msgError');

        formulario.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Bloqueo de botón durante el proceso
            btnEnviar.textContent = "Guardando en Base de Datos...";
            btnEnviar.disabled = true;

            // Extraer el plan (Básico, Hogar, Turbo, VIP o Solo TV)
            const planSeleccionado = document.querySelector('input[name="plan"]:checked').value;

            // Estructurar el Payload que leerá la APK
            const payloadCliente = {
                nombres: document.getElementById('nombres').value.trim(),
                apellidos: document.getElementById('apellidos').value.trim(),
                cedula: document.getElementById('cedula').value.trim(),
                telefono_principal: document.getElementById('telefono_principal').value.trim(),
                direccion: document.getElementById('direccion').value.trim(),
                sector: document.getElementById('sector').value.trim(),
                ciudad: document.getElementById('ciudad').value.trim(),
                coordenadas: document.getElementById('coordenadas').value.trim(),
                plan_asignado: planSeleccionado,
                promotor: document.getElementById('promotor').value,
                estado_sistema: "Pendiente de Auditoría",
                fecha_registro: serverTimestamp() // Sincronización perfecta de tiempo
            };

            try {
                // INSERCIÓN EXACTA A LA COLECCIÓN "Contratos_Web"
                await addDoc(collection(db, "Contratos_Web"), payloadCliente);
                
                // Respuesta visual de éxito
                msgSuccess.style.display = 'block';
                msgError.style.display = 'none';
                formulario.reset();
                window.scrollTo({ top: 0, behavior: 'smooth' });

                setTimeout(() => { msgSuccess.style.display = 'none'; }, 4000);

            } catch (error) {
                console.error("Fallo en la transacción: ", error);
                msgError.textContent = "Error de red: " + error.message;
                msgError.style.display = 'block';
                msgSuccess.style.display = 'none';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } finally {
                btnEnviar.textContent = "Registrar en Contratos Web";
                btnEnviar.disabled = false;
            }
        });
    </script>
</body>
</html>
